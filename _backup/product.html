<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product Detail — PriceWatch BD</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .price-market-card {
      background: white;
      border-radius: var(--radius);
      padding: 16px 20px;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: all var(--transition);
    }

    .price-market-card:hover {
      border-color: var(--green-300);
      box-shadow: var(--shadow);
    }

    .pm-name {
      font-weight: 600;
      font-size: .95rem;
    }

    .pm-loc {
      font-size: .82rem;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .pm-price {
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--green-700);
    }

    .pm-date {
      font-size: .78rem;
      color: var(--text-muted);
    }

    .lowest {
      background: var(--green-50);
      border-color: var(--green-400) !important;
    }

    .highest {
      background: var(--red-100);
      border-color: var(--red-500) !important;
    }

    .price-cards-list {
      display: grid;
      gap: 12px;
    }

    .chart-full {
      height: 220px;
      width: 100%;
    }
  </style>
</head>

<body>
  <nav class="navbar">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">
        <div class="logo-icon">🛒</div> Price<span class="accent">Watch</span> BD
      </a>
      <nav class="nav-links" id="navLinks">
        <a href="index.html">Home</a>
        <a href="products.html" class="active">Products</a>
        <a href="markets.html">Markets</a>
        <a href="trending.html">Trending</a>
        <a href="submit.html">Submit Price</a>
      </nav>
      <div class="nav-right" id="navRight"></div>
      <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
    </div>
  </nav>

  <main class="page">
    <div class="container" id="pageContent">
      <div class="loading">
        <div class="spinner"></div>
      </div>
    </div>
  </main>

  <div class="toast-container" id="toastContainer"></div>
  <script src="app.js"></script>
  <script>
    PWBD.initNav();

    const params = new URLSearchParams(window.location.search);
    const productId = params.get('id');

    if (!productId) { window.location = 'products.html'; }

    async function load() {
      const p = await PWBD.apiFetch('/products/' + productId);
      if (!p) { document.getElementById('pageContent').innerHTML = '<div class="empty-state"><div class="empty-icon">❌</div><h3>Product not found</h3></div>'; return; }

      document.title = `${p.nameEn} Price — PriceWatch BD`;
      const prices = p.prices || [];
      const lowest = prices.length ? prices.reduce((a, b) => a.price < b.price ? a : b) : null;
      const highest = prices.length ? prices.reduce((a, b) => a.price > b.price ? a : b) : null;

      document.getElementById('pageContent').innerHTML = `
    <div style="margin-bottom:16px">
      <a href="products.html" style="color:var(--green-600);font-weight:600;font-size:.9rem">← Back to Products</a>
    </div>
    <div class="detail-header">
      <div class="detail-icon">${p.icon}</div>
      <div class="detail-meta">
        <h1>${p.nameEn}</h1>
        <h2>${p.name}</h2>
        <p style="margin-top:8px;color:var(--text-muted);font-size:.92rem">${p.description}</p>
        <div class="detail-price">৳${p.avgPrice ?? '—'} <small>avg / ${p.unit}</small></div>
        <div style="margin-top:8px">${PWBD.trendBadge(p.trend)}</div>
      </div>
      <div style="display:flex;gap:20px;margin-left:auto;flex-wrap:wrap">
        <div style="text-align:center;background:var(--green-50);border:1px solid var(--green-200);border-radius:12px;padding:16px 24px">
          <div style="font-size:.8rem;color:var(--text-muted);font-weight:600">Lowest</div>
          <div style="font-size:1.6rem;font-weight:800;color:var(--green-700)">৳${lowest?.price ?? '—'}</div>
          <div style="font-size:.78rem;color:var(--text-muted)">${lowest?.market?.nameEn ?? ''}</div>
        </div>
        <div style="text-align:center;background:var(--red-100);border:1px solid var(--red-500);border-radius:12px;padding:16px 24px">
          <div style="font-size:.8rem;color:var(--text-muted);font-weight:600">Highest</div>
          <div style="font-size:1.6rem;font-weight:800;color:var(--red-500)">৳${highest?.price ?? '—'}</div>
          <div style="font-size:.78rem;color:var(--text-muted)">${highest?.market?.nameEn ?? ''}</div>
        </div>
      </div>
    </div>

    <div class="trending-grid" style="margin-bottom:28px">
      <div class="chart-card">
        <div class="chart-card-header">
          <span class="chart-card-title">📈 7-Day Price Trend</span>
          <span style="font-size:.82rem;color:var(--text-muted)">Last 7 days · Avg price in ৳</span>
        </div>
        <canvas class="chart-full" id="mainChart"></canvas>
      </div>
      <div class="chart-card">
        <div class="chart-card-header"><span class="chart-card-title">Market Breakdown</span></div>
            <div class="trend-list">
              ${prices.map(e => `
                <div class="trend-item" style="${!e.verified ? 'opacity:0.7' : ''}">
                  <div class="trend-item-left">
                    <span class="trend-item-icon">🏪</span>
                    <div>
                      <div class="trend-item-name">${e.marketNameEn ?? 'Unknown'}</div>
                      <div class="trend-item-avg">${e.location ?? ''} · ${new Date(e.date).toLocaleDateString()}</div>
                    </div>
                  </div>
                  <div style="text-align:right">
                    <strong style="color:${e.verified ? 'var(--green-700)' : 'var(--gray-500)'}">৳${e.price}</strong>
                    ${!e.verified ? '<div style="font-size:0.65rem;color:var(--gray-500)">Pending</div>' : ''}
                  </div>
                </div>`).join('')}
            </div>
          </div>
        </div>
    
        <div class="section-header"><h2 class="section-title">Market <span>Prices</span></h2><a href="submit.html?product=${p.id}" class="btn btn-primary" style="font-size:.88rem;padding:10px 20px">+ Submit Update</a></div>
        <div class="price-cards-list">
          ${prices.length ? prices.map(e => `
            <div class="price-market-card ${e === lowest ? 'lowest' : ''} ${e === highest ? 'highest' : ''}" style="${!e.verified ? 'border-style:dashed;' : ''}">
              <div>
                <div class="pm-name">🏪 ${e.marketNameEn ?? 'Unknown Market'}</div>
                <div class="pm-loc">📍 ${e.location ?? ''} &nbsp;·&nbsp; ${e.marketType ?? ''}</div>
              </div>
              <div style="text-align:right">
                <div class="pm-price">৳${e.price}</div>
                <div class="pm-date">
                    ${new Date(e.date).toLocaleDateString()} 
                    ${e.verified ? '<span style="color:var(--green-600);font-weight:700">✅ Verified</span>' : '<span style="color:var(--gray-500)">🕒 Pending</span>'}
                </div>
              </div>
            </div>`).join('') : '<div class="empty-state"><div class="empty-icon">📊</div><h3>No price data yet</h3><p>Be the first to <a href="submit.html" style="color:var(--green-600);font-weight:600">submit a price</a>!</p></div>'}
        </div>
  `;

      requestAnimationFrame(() => {
        PWBD.drawSparkline(document.getElementById('mainChart'), p.history, p.trend >= 0 ? '#ef4444' : '#16a34a');
      });
    }

    load();
  </script>
</body>

</html>
